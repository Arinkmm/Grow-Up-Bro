services:
  postgres:
    image: postgres:17
    container_name: pg_cr1
    environment:
      POSTGRES_DB: controlwork1_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  flyway:
    image: flyway/flyway
    depends_on:
      - postgres
    command:
      - "migrate"
      - "-baselineOnMigrate=true"
    volumes:
      - ./migrations:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/controlwork1_db
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: pass
      FLYWAY_BASELINE_VERSION: 1
      FLYWAY_BASELINE_DESCRIPTION: "Initial baseline"
      FLYWAY_SCHEMAS: public

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin1
    environment:
      PGADMIN_DEFAULT_EMAIL: mairabeeva42@gmail.com
      PGADMIN_DEFAULT_PASSWORD: pass
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pg_data: