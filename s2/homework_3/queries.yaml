pg_detailed_stats:
  query: |
    SELECT 
      sum(n_tup_ins) as inserts,
      sum(n_tup_del) as deletes,
      sum(seq_tup_read + idx_tup_fetch) as selects
    FROM pg_stat_user_tables
  metrics:
    - selects:
        usage: "COUNTER"
        description: "Total rows fetched (SELECT)"
    - inserts:
        usage: "COUNTER"
        description: "Total rows inserted"
    - deletes:
        usage: "COUNTER"
        description: "Total rows deleted"

pg_active_sessions:
  query: |
    SELECT count(*) as active_count 
    FROM pg_stat_activity 
    WHERE state = 'active' AND backend_type = 'client backend'
  metrics:
    - active_count:
        usage: "GAUGE"
        description: "Number of currently active client sessions"

pg_version_info:
  query: "SELECT version() as pg_version, 1 as static_value"
  metrics:
    - pg_version:
        usage: "LABEL"
        description: "PostgreSQL Version String"
    - static_value:
        usage: "GAUGE"
        description: "Static value to carry version label"