version: '3.8'

services:
  master:
    image: postgres:17
    container_name: pg_master
    environment:
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: GrowUpBro
    ports:
      - "5432:5432"
    volumes:
      - master_data:/var/lib/postgresql/data
      - ./master.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway
    depends_on:
      master:
        condition: service_healthy
    command:
      - "migrate"
    volumes:
      - ../homework_1/migrations:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://master:5432/GrowUpBro
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: pass
      FLYWAY_BASELINE_VERSION: 1
      FLYWAY_BASELINE_DESCRIPTION: "Initial baseline"
      FLYWAY_SCHEMAS: main,refs,links

  logical:
    image: postgres:17
    container_name: pg_logical
    environment:
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: GrowUpBro
    ports:
      - "5435:5432"
    depends_on:
      - master
    volumes:
      - logical_data:/var/lib/postgresql/data

  standby1:
    image: postgres:17
    container_name: pg_standby1
    environment:
      POSTGRES_PASSWORD: pass
    ports:
      - "5433:5432"
    depends_on:
      - master
    volumes:
      - standby1_data:/var/lib/postgresql/data

  standby2:
    image: postgres:17
    container_name: pg_standby2
    environment:
      POSTGRES_PASSWORD: pass
    ports:
      - "5434:5432"
    depends_on:
      - master
    volumes:
      - standby2_data:/var/lib/postgresql/data

volumes:
  master_data:
  standby1_data:
  standby2_data:
  logical_data: